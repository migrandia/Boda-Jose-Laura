<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mi Gran Día</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display&family=Montserrat&display=swap" rel="stylesheet">

<style>

:root{
--color:#c9a96e;
--fondo:url('https://images.unsplash.com/photo-1519741497674-611481863552');
}

body{
margin:0;
font-family:Montserrat;
background:#f5f3f0;
overflow-x:hidden;
}

/* PANTALLA INICIAL */
#inicio{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
color:white;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:999;
}

#inicio button{
padding:15px 30px;
border:none;
background:var(--color);
color:white;
font-size:18px;
border-radius:30px;
}

/* HERO */
.hero{
height:100vh;
background:var(--fondo) center/cover;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
color:white;
text-align:center;
background-color:rgba(0,0,0,.4);
background-blend-mode:darken;
}

.hero h1{
font-family:'Great Vibes';
font-size:70px;
margin:0;
animation:fade 2s;
}

.hero p{
font-family:'Playfair Display';
font-size:20px;
}

/* SECCIONES */
.section{
padding:60px 20px;
text-align:center;
}

.box{
background:grey;
padding:25px;
border-radius:20px;
max-width:800px;
margin:auto;
box-shadow:0 10px 30px rgba(0,0,0,.1);
}

/* CONTADOR */
.countdown{
font-size:22px;
font-weight:bold;
margin-top:10px;
}

/* GALERIA */
.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:10px;
padding:20px;
}

.gallery img{
width:100%;
height:220px;
object-fit:cover;
border-radius:10px;
transition:.3s;
}

.gallery img:hover{
transform:scale(1.05);
}

/* BOTONES */
button{
padding:15px 30px;
border:none;
background:var(--color);
color:white;
border-radius:30px;
cursor:pointer;
margin:10px;
}

/* ANIMACIONES */
@keyframes fade{
from{opacity:0; transform:translateY(20px)}
to{opacity:1}
}

</style>
</head>

<body>

<!-- MUSICA -->
<audio id="musica" loop>
<source src="https://drive.google.com/file/d/1gllCs_V2LXOL5LDhRRIRWeuZv68TEK5R/view?usp=sharing">
</audio>

<!-- PANTALLA INICIAL -->
<div id="inicio">
<h2>Mi Gran Día</h2>
<button onclick="entrar()">Entrar a la invitación</button>
</div>

<script>

const datos={
nombres:"Alejandro & Camila",
frase:"¡Nos casamos!",
fechaTexto:"18 Octubre 2026",
fechaContador:"Oct 18, 2026 17:00:00",

historia:"Desde el primer momento supimos que este día llegaría...",

iglesia:"Parroquia Santo Tomas Apostol",
mapaIglesia:"https://www.google.com/maps?q=Parroquia+de+Santo+Tomás+de+Apóstol&output=embed",

recepcion:"Salón Villa Lucila",
mapaRecepcion:"https://www.google.com/maps?q=Salon+Villa+Lucila&output=embed",

padrinos:"Juan y María",

whatsapp:"5219991234567",

fotos:[
"https://images.unsplash.com/photo-1520857014576-2c4f4c972b57",
"https://images.unsplash.com/photo-1519741497674-611481863552",
"https://images.unsplash.com/photo-1504198453319-5ce911bafcde"
]
}

// ENTRADA
function entrar(){
document.getElementById("inicio").style.display="none"
document.getElementById("musica").play()
}

// DATOS
document.addEventListener("DOMContentLoaded",()=>{
document.getElementById("nombres").innerText=datos.nombres
document.getElementById("frase").innerText=datos.frase
document.getElementById("fecha").innerText=datos.fechaTexto
document.getElementById("historia").innerText=datos.historia
document.getElementById("iglesia").innerText=datos.iglesia
document.getElementById("recepcion").innerText=datos.recepcion
document.getElementById("padrinos").innerText=datos.padrinos

document.getElementById("mapa1").src=datos.mapaIglesia
document.getElementById("mapa2").src=datos.mapaRecepcion

document.getElementById("btnConfirmar").onclick=()=>{
window.open(`https://wa.me/${datos.whatsapp}`)
}

// GALERIA
const gallery=document.getElementById("gallery")
datos.fotos.forEach(f=>{
const img=document.createElement("img")
img.src=f
gallery.appendChild(img)
})

// CONTADOR
const fecha=new Date(datos.fechaContador).getTime()

setInterval(()=>{
const now=new Date().getTime()
const diff=fecha-now

const dias=Math.floor(diff/(1000*60*60*24))
const horas=Math.floor((diff%(1000*60*60*24))/(1000*60*60))
const minutos=Math.floor((diff%(1000*60*60))/(1000*60))

contador.innerHTML=`${dias} días ${horas} hrs ${minutos} min`
},1000)

})

</script>

<!-- HERO -->
<div class="hero">
<h1 id="nombres"></h1>
<p id="frase"></p>
</div>

<!-- FECHA -->
<div class="section">
<div class="box">
<p id="fecha"></p>
<div class="countdown" id="contador"></div>
</div>
</div>

<!-- HISTORIA -->
<div class="section">
<div class="box">
<h2>Nuestra Historia</h2>
<p id="historia"></p>
</div>
</div>

<!-- IGLESIA -->
<div class="section">
<div class="box">
<h2>Ceremonia</h2>
<p id="iglesia"></p>
<iframe id="mapa1" width="100%" height="250"></iframe>
</div>
</div>

<!-- RECEPCION -->
<div class="section">
<div class="box">
<h2>Recepción</h2>
<p id="recepcion"></p>
<iframe id="mapa2" width="100%" height="250"></iframe>
</div>
</div>

<!-- PADRINOS -->
<div class="section">
<div class="box">
<h2>Padrinos</h2>
<p id="padrinos"></p>
</div>
</div>

<!-- GALERIA -->
<div class="section">
<h2>Galería</h2>
<div class="gallery" id="gallery"></div>
</div>

<!-- CONFIRMACION -->
<div class="section">
<button id="btnConfirmar">Confirmar asistencia</button>
</div>

</body>
</html>
